<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Akun</title>
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔥 BACKGROUND UTAMA (DESKTOP) */
body {
    min-height: 100vh;
    background: #81898a;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Container */
.container {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.5s ease;
    position: relative;
    z-index: 2;
}

/* Animasi */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    font-size: 24px;
}

/* Input */
.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #81898a;
    box-shadow: 0 0 8px rgba(79,172,254,0.4);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: #81898a;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
}

/* Link */
.link {
    text-align: center;
    margin-top: 18px;
}

.link a {
    display: block;
    text-decoration: none;
    color: #81898a;
    font-size: 14px;
    margin-top: 6px;
}
/* ========================= */
/* 📱 RESPONSIVE HP */
/* ========================= */
@media (max-width: 480px) {

body {
    padding: 15px;
    align-items: flex-start; /* biar tidak terlalu ke tengah */
}

.container {
    max-width: 100%;
    padding: 20px;
    border-radius: 12px;
}

h2 {
    font-size: 20px;
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group input {
    padding: 12px;
    font-size: 14px;
}

button {
    padding: 12px;
    font-size: 15px;
}

.link {
    margin-top: 15px;
}

.link a {
    font-size: 13px;
}
}

/* 📱 HP sangat kecil */
@media (max-width: 320px) {

.container {
    padding: 15px;
}

h2 {
    font-size: 18px;
}

.input-group input {
    font-size: 13px;
    padding: 10px;
}

button {
    font-size: 14px;
    padding: 10px;
}
}
</style>
<body>

<div class="container">
    <h2>Buat Akun</h2>

    <form>
        <div class="input-group">
            <div class="input-group">
                <input type="text" name="nama" placeholder="Nama Lengkap" required>
            </div>
    
            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
    
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
    
            <button type="submit">Daftar</button>
    </form>

    <div class="link">
        <a href="Login.html">Sudah punya akun? Login</a>
    </div>
</div>

</body>
</html>
